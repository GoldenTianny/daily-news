* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {

    font-weight: 600;

}
.top-bar .home-link:hover, .top-bar .home-link:active { opacity: 1; }
.top-bar .brand {
    font-size: 14px;
    font-weight: 700;
    margin-left: auto;

}

/* 헤더 */
.hero {
    background: linear-gradient(135deg, #1a3a6c 0%, #2a5ca8 100%);

    text-align: center;
    position: relative;
    overflow: hidden;
}
.hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
}
.hero h1 {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 8px;
    letter-spacing: -1px;
    line-height: 1.2;
    position: relative;
}
.hero .subtitle {
    font-size: 13.5px;
    opacity: 0.92;
    position: relative;
    word-break: keep-all;
}

.list-section {
    margin: 24px 12px;
}
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 6px 12px;
    border-bottom: 2px solid #d0d8e4;
    margin-bottom: 14px;
}
.section-header h2 {

    font-weight: 700;
}
.section-header .meta {

}

/* 통계 카드 (2x2 그리드) */
.summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
}
.summary-card {
    background: white;
    border-radius: 12px;
    padding: 16px 14px;
    border-left: 4px solid #1a3a6c;

}

.summary-card .label {
    font-size: 11.5px;
    color: #888;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
}
.summary-card .value {
    font-size: 24px;
    font-weight: 800;
    color: #1a3a6c;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
}
.summary-card.accent .value { color: #c0392b; }
.summary-card .sub {
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
}

/* TOP 리스트 */
.top-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.top-item {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    text-decoration: none;
    color: inherit;

    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);

}
.top-item:active {
    transform: scale(0.99);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.top-item .rank {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: #f0f4fa;
    color: #1a3a6c;
    border-radius: 50%;

    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
}
.top-item .rank.medal-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #5a3a00; }
.top-item .rank.medal-2 { background: linear-gradient(135deg, #d8d8d8, #b0b0b0); color: #333; }
.top-item .rank.medal-3 { background: linear-gradient(135deg, #d8a070, #b87a44); color: white; }
.top-item .info {
    flex: 1;
    min-width: 0;
}
.top-item .title {
    font-size: 13.5px;
    font-weight: 600;
    color: #0d2444;
    margin-bottom: 2px;
    word-break: keep-all;
    line-height: 1.4;
}
.top-item .meta {
    font-size: 11px;
    color: #888;
}
.top-item .like-count {
    flex-shrink: 0;
    background: #fdf3f1;
    color: #c0392b;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12.5px;
    font-weight: 800;
    white-space: nowrap;
}

/* 빈 상태 */

/* 정보 박스 */

/* 푸터 */

@media (prefers-color-scheme: dark) {

    .section-header { border-bottom-color: #2d3340; }

    .footer-logo { color: #6da3e8 !important; }
    .info-note { background: #1c2538; color: #a8c5ed; border-left-color: #6da3e8; }
    .chart-svg text { fill: #aaa; }
}

/* 큰 화면 */
@media (min-width: 600px) {
    body { max-width: 720px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    .summary-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>

        </svg>

</div>

<!-- 푸터 -->
<div class="footer">
    <div class="footer-logo">📰 가좌버핏 뉴스</div>
    <a href="../" style="color:#1a3a6c; font-weight:600;">← 홈으로 돌아가기</a><br/>
    <span style="font-size:10px; opacity:0.7; display:inline-block; margin-top:8px;">Powered by GitHub Pages · Supabase</span>
</div>

<script>
// ============================================================
// Supabase 통계 페이지
// ============================================================
const SB_URL = 'https://ujpelcnigrryjprztzhf.supabase.co';
const SB_KEY = 'sb_publishable_T7clvSByrkZhWml7W_Oh6Q_qtm0Rj6p';
const SB_HEADERS = {
    'Content-Type': 'application/json',
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY
};

async function callRPC(name, params) {
    const r = await fetch(SB_URL + '/rest/v1/rpc/' + name, {
        method: 'POST',
        headers: SB_HEADERS,
        body: JSON.stringify(params || {})
    });
    if (!r.ok) {
        const text = await r.text();
        throw new Error(name + ' (' + r.status + '): ' + text);
    }
    return await r.json();
}

// 슬러그 → 페이지 정보 파싱
// '2026-05-12_a1' → { date, articleId, url, label }
function parseSlug(slug) {
    // 일일브리프 패턴: YYYY-MM-DD_aN
    let m = slug.match(/^(\d{4}-\d{2}-\d{2})_(a\d+)$/);
    if (m) {
        return {
            kind: 'archive',
            date: m[1],
            articleId: m[2],
            url: '../archive/' + m[1] + '.html#' + m[2],
            label: m[1].slice(2).replace(/-/g, '.') + ' · ' + m[2].slice(1) + '번 기사'
        };
    }
    // 심층분석/기업분석 패턴: YYYY-MM-DD_slug
    m = slug.match(/^(\d{4}-\d{2}-\d{2})_(.+)$/);
    if (m) {
        return {
            kind: 'longform',
            date: m[1],
            articleId: m[2],
            url: '#', // 어느 폴더(analysis/companies)인지 알 수 없어서 일단 #
            label: m[1].slice(2).replace(/-/g, '.') + ' · ' + m[2]
        };
    }
    return { kind: 'unknown', date: '', articleId: slug, url: '#', label: slug };
}

// 제목 캐시 (24시간)
const TITLE_CACHE_KEY = 'gjb_title_cache_v1';
const titleCache = (() => {
    try { return JSON.parse(localStorage.getItem(TITLE_CACHE_KEY) || '{}'); }
    catch (e) { return {}; }
})();
const TITLE_TTL = 24 * 60 * 60 * 1000;

async function fetchArticleTitle(slug) {
    const cached = titleCache[slug];
    if (cached && (Date.now() - cached.t) < TITLE_TTL) {
        return cached.v;
    }
    const info = parseSlug(slug);
    if (info.kind !== 'archive') return null;
    try {
        const res = await fetch('../archive/' + info.date + '.html', { cache: 'force-cache' });
        if (!res.ok) return null;
        const html = await res.text();
        const re = new RegExp('<article[^>]*id="' + info.articleId + '"[^>]*>[\\s\\S]*?<h3[^>]*>([^<]+)<\\/h3>', 'i');
        const m = html.match(re);
        const title = m ? m[1].trim() : null;
        if (title) {
            titleCache[slug] = { v: title, t: Date.now() };
            try { localStorage.setItem(TITLE_CACHE_KEY, JSON.stringify(titleCache)); } catch (e) {}
        }
        return title;
    } catch (e) {
        return null;
    }
}

// 일자별 차트 그리기
function drawDailyChart(daily) {
    const svg = document.getElementById('dailyChart');
    if (!daily || !daily.length) {
        svg.innerHTML = '<text x="180" y="100" text-anchor="middle" font-size="12">아직 데이터가 없어요</text>';
        return;
    }

    // 최근 30일 빈 날짜 채우기 (좋아요 0인 날도 표시)
    const dataMap = {};
    daily.forEach(d => { dataMap[d.day] = Number(d.likes) || 0; });

    const days = [];
    const today = new Date();
    for (let i = 29; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        days.push({ day: key, likes: dataMap[key] || 0 });
    }

    const W = 360, H = 200, PAD_L = 32, PAD_R = 12, PAD_T = 16, PAD_B = 24;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - PAD_T - PAD_B;
    const maxLikes = Math.max(...days.map(d => d.likes), 1);
    const barWidth = innerW / days.length;

    let svgContent = '';

    // 그리드라인 (4개)
    [0, 0.25, 0.5, 0.75, 1].forEach(p => {
        const y = PAD_T + innerH * p;
        const labelVal = Math.round(maxLikes * (1 - p));
        svgContent += '<line x1="' + PAD_L + '" y1="' + y + '" x2="' + (W - PAD_R) + '" y2="' + y + '" stroke="#e8edf5" stroke-width="1" stroke-dasharray="3 3"/>';
        if (p === 0 || p === 1) {
            svgContent += '<text x="' + (PAD_L - 4) + '" y="' + (y + 3) + '" text-anchor="end">' + labelVal + '</text>';
        }
    });

    // 바
    days.forEach((d, i) => {
        const barH = (d.likes / maxLikes) * innerH;
        const x = PAD_L + i * barWidth + 1;
        const y = H - PAD_B - barH;
        const color = d.likes > 0 ? '#c0392b' : '#e8edf5';
        svgContent += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + (barWidth - 2).toFixed(1) + '" height="' + Math.max(barH, 1).toFixed(1) + '" fill="' + color + '" opacity="0.85" rx="1"/>';
        // 0이 아닌 값 위에 숫자
        if (d.likes > 0 && d.likes >= maxLikes * 0.5) {
            svgContent += '<text x="' + (x + barWidth/2 - 1).toFixed(1) + '" y="' + (y - 3).toFixed(1) + '" text-anchor="middle" font-weight="700" fill="#c0392b">' + d.likes + '</text>';
        }
    });

    // X축 (5일 간격)
    days.forEach((d, i) => {
        if (i % 7 === 0 || i === days.length - 1) {
            const x = PAD_L + i * barWidth + barWidth/2;
            const label = d.day.slice(5).replace('-', '/');
            svgContent += '<text x="' + x.toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle">' + label + '</text>';
        }
    });

    svg.innerHTML = svgContent;
}

// 메인 로드
async function loadStats() {
    let summary = [], daily = [];
    try {
        [summary, daily] = await Promise.all([
            callRPC('gjbuffet_stats_summary'),
            callRPC('gjbuffet_stats_daily', { p_days: 30 })
        ]);
    } catch (e) {
        console.error('통계 로드 실패', e);
        document.getElementById('topEmpty').innerHTML =
            '<span class="em-icon">⚠️</span>통계 데이터를 불러오지 못했어요.<br/>' +
            '<span style="font-size:11px; opacity:0.7;">' + e.message + '</span>';
        document.getElementById('dailyChart').innerHTML =
            '<text x="180" y="100" text-anchor="middle" font-size="12">불러오기 실패</text>';
        return;
    }

    // 요약 카드
    const totalLikes = summary.reduce((s, x) => s + Number(x.likes), 0);
    const articleCount = summary.length;

    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 7);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    const weekLikes = daily
        .filter(d => d.day >= cutoffStr)
        .reduce((s, x) => s + Number(x.likes), 0);

    const avg = articleCount ? (totalLikes / articleCount).toFixed(1) : '0';

    document.getElementById('totalLikes').textContent = totalLikes.toLocaleString();
    document.getElementById('articleCount').textContent = articleCount.toLocaleString();
    document.getElementById('weekLikes').textContent = weekLikes.toLocaleString();
    document.getElementById('avgLikes').textContent = avg;
    document.getElementById('updatedAt').textContent = '업데이트: ' +
        new Date().toLocaleString('ko-KR', { dateStyle: 'short', timeStyle: 'short' });

    // TOP 10
    const top10 = summary.slice(0, 10);
    const listEl = document.getElementById('topList');

    if (top10.length === 0) {
        document.getElementById('topEmpty').innerHTML =
            '<span class="em-icon">📭</span>아직 좋아요 데이터가 쌓이지 않았어요.<br/>' +
            '<span style="font-size:12px; opacity:0.8;">기사를 읽고 ❤️ 버튼을 눌러보세요</span>';
    } else {
        listEl.innerHTML = '';
        top10.forEach((item, i) => {
            const info = parseSlug(item.slug);
            const rankClass = i < 3 ? 'medal-' + (i+1) : '';
            const a = document.createElement('a');
            a.className = 'top-item';
            a.href = info.url;
            a.innerHTML =
                '<div class="rank ' + rankClass + '">' + (i+1) + '</div>' +
                '<div class="info">' +
                    '<div class="title" data-slug="' + item.slug + '">' + info.label + '</div>' +
                    '<div class="meta">' + item.slug + '</div>' +
                '</div>' +
                '<div class="like-count">❤️ ' + item.likes + '</div>';
            listEl.appendChild(a);
        });

        // 비동기로 진짜 제목 채우기
        top10.forEach(async (item, i) => {
            const title = await fetchArticleTitle(item.slug);
            if (title) {
                const titleEl = listEl.children[i].querySelector('.title');
                if (titleEl) titleEl.textContent = title;
            }
        });
    }

    // 일자별 차트
    drawDailyChart(daily);
}
