<script>
// ============================================================
// 좋은글 게시판 — Supabase 좋아요 통합
// ============================================================

// ==== Supabase 설정 ====
const SB_URL = 'https://ujpelcnigrryjprztzhf.supabase.co';
const SB_KEY = 'sb_publishable_T7clvSByrkZhWml7W_Oh6Q_qtm0Rj6p';
const SB_HEADERS = {
    'Content-Type': 'application/json',
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY
};

let fp = localStorage.getItem('gjb_fp');
if (!fp) {
    fp = (crypto.randomUUID && crypto.randomUUID()) ||
         ('fp_' + Date.now() + '_' + Math.random().toString(36).slice(2));
    localStorage.setItem('gjb_fp', fp);
}

// 좋아요 슬러그 형식: article_<id>
function articleSlug(id) { return 'article_' + id; }

// ==== 풍경/꽃 이미지 (Picsum, 큐레이션 ID) ====
// Picsum CDN — API 키 불필요. 글 ID를 시드로 → 같은 글은 항상 같은 2장
const NATURE_IMAGES = [
    10, 11, 13, 14, 15, 16, 17, 18, 19,
    25, 27, 28, 29, 30, 31, 36, 37, 38,
    42, 47, 49, 50, 53, 54, 56, 57, 58, 60,
    65, 67, 76, 100, 101, 110, 122, 130, 134, 142, 165
];

function hashCode(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
        h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    }
    return h >>> 0;
}

function pickImages(articleId) {
    const seed = hashCode(articleId);
    const rand = seededRandom(seed);
    // Fisher-Yates shuffle (시드 고정 → 결정적)
    const arr = NATURE_IMAGES.slice();
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr.slice(0, 2).map(id => `https://picsum.photos/id/${id}/800/500`);
}

async function fetchLikeCount(slug) {
    try {
        const r = await fetch(SB_URL + '/rest/v1/rpc/gjbuffet_get_like_count', {
            method: 'POST', headers: SB_HEADERS,
            body: JSON.stringify({ p_slug: slug })
        });
        const v = await r.json();
        return (typeof v === 'number') ? v : 0;
    } catch (e) { return 0; }
}

async function addLike(slug) {
    const r = await fetch(SB_URL + '/rest/v1/rpc/gjbuffet_add_like', {
        method: 'POST', headers: SB_HEADERS,
        body: JSON.stringify({ p_slug: slug, p_fp: fp })
    });
    if (!r.ok) throw new Error('add_like failed: ' + r.status);
    return await r.json();
}

// ==== 데이터 로드 ====
let ALL = [];        // 모든 글 배열
let FILTERED = [];   // 검색 필터 결과
const PAGE_SIZE = 20;
let currentPage = 1;

async function loadArticles() {
    try {
        const res = await fetch('articles.json', { cache: 'force-cache' });
        ALL = await res.json();
        FILTERED = ALL;
        renderToday();
        renderList();
    } catch (e) {

        document.getElementById('todayList').innerHTML =
            '<div class="empty"><span class="em-icon">⚠️</span>글을 불러오지 못했어요.</div>';
        document.getElementById('listArea').innerHTML =
            '<div class="empty"><span class="em-icon">⚠️</span>전체 목록을 불러오지 못했어요.</div>';
    }
}

// ==== 오늘의 글 3개 (날짜 시드 기반) ====
function todaySeed() {
    const d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// 시드 고정 PRNG (mulberry32) — 시드 차이가 작아도 출력이 크게 달라짐
// 이전 LCG는 연속 날짜(20260512↔20260513)에서 첫 출력이 거의 같은 문제 있었음
function seededRandom(seed) {
    let a = seed | 0;
    return function() {
        a = (a + 0x6D2B79F5) | 0;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function pickToday(arr, n) {
    const rand = seededRandom(todaySeed());
    const total = arr.length;
    const picked = new Set();
    let safety = 0;
    while (picked.size < n && safety < n * 50) {
        picked.add(Math.floor(rand() * total));
        safety++;
    }
    return [...picked].slice(0, n).map(i => arr[i]);
}

function formatDate(yyyymmdd) {
    if (!yyyymmdd) return '';
    return yyyymmdd.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$1.$2.$3');
}

function renderToday() {
    const today = pickToday(ALL, 3);
    const container = document.getElementById('todayList');
    container.innerHTML = '';
    today.forEach(a => container.appendChild(makeCard(a, true)));

    // 오늘 날짜 라벨도 제거 — '🌅 오늘의 좋은글' 헤더만으로 충분
    document.getElementById('todayDateLabel').textContent = '';
}

// ==== 카드 생성 ====
function makeCard(article, isToday) {
    const card = document.createElement('div');
    card.className = 'article-card' + (isToday ? ' today-card' : '');
    card.dataset.id = article.id;

    // 본문 미리보기 (제목 제외)
    const preview = (article.body || '').slice(0, 200);

    card.innerHTML =
        '<div class="card-title">' + escapeHtml(article.title) + '</div>' +
        '<div class="card-preview">' + escapeHtml(preview) + '</div>';

    card.addEventListener('click', () => openModal(article));
    return card;
}

function escapeHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

// ==== 전체 목록 (페이지네이션) ====
function renderList() {
    const list = document.getElementById('listArea');
    list.innerHTML = '';

    if (FILTERED.length === 0) {
        list.innerHTML = '<div class="empty"><span class="em-icon">📭</span>일치하는 글이 없어요.</div>';
        document.getElementById('pagination').hidden = true;
        return;
    }

    const totalPages = Math.ceil(FILTERED.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const slice = FILTERED.slice(start, end);

    slice.forEach(a => list.appendChild(makeCard(a, false)));

    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const pag = document.getElementById('pagination');
    pag.innerHTML = '';
    pag.hidden = false;

    // 이전
    const prev = document.createElement('button');
    prev.textContent = '‹';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => { currentPage--; renderList(); window.scrollTo({top: 0, behavior: 'smooth'}); });
    pag.appendChild(prev);

    // 페이지 번호 (현재 ±2 + 처음/끝)
    const pageNumbers = new Set([1, totalPages, currentPage]);
    for (let i = -2; i <= 2; i++) {
        const p = currentPage + i;
        if (p > 0 && p <= totalPages) pageNumbers.add(p);
    }
    const sorted = [...pageNumbers].sort((a, b) => a - b);

    let lastNum = 0;
    sorted.forEach(p => {
        if (p - lastNum > 1) {
            const span = document.createElement('span');
            span.className = 'page-info';
            span.textContent = '…';
            pag.appendChild(span);
        }
        const btn = document.createElement('button');
        btn.textContent = p;
        if (p === currentPage) btn.classList.add('active');
        btn.addEventListener('click', () => { currentPage = p; renderList(); window.scrollTo({top: 0, behavior: 'smooth'}); });
        pag.appendChild(btn);
        lastNum = p;
    });

    // 다음
    const next = document.createElement('button');
    next.textContent = '›';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => { currentPage++; renderList(); window.scrollTo({top: 0, behavior: 'smooth'}); });
    pag.appendChild(next);

    // 글 수 정보
    const info = document.createElement('span');
    info.className = 'page-info';
    info.textContent = `총 ${FILTERED.length}편`;
    pag.appendChild(info);
}

// ==== 검색 ====
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

let searchTimeout = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        const q = searchInput.value.trim().toLowerCase();
        clearBtn.hidden = !q;
        if (!q) {
            FILTERED = ALL;
        } else {
            FILTERED = ALL.filter(a =>
                a.title.toLowerCase().includes(q) ||
                a.body.toLowerCase().includes(q)
            );
        }
        currentPage = 1;
        renderList();
    }, 200);
});

clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.hidden = true;
    FILTERED = ALL;
    currentPage = 1;
    renderList();
});

// ==== 랜덤 보기 ====
document.getElementById('randomBtn').addEventListener('click', () => {
    if (ALL.length === 0) return;
    const idx = Math.floor(Math.random() * ALL.length);
    openModal(ALL[idx]);
});

// ==== 모달 (글 상세) ====
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
const modalMeta = document.getElementById('modalMeta');
const modalLike = document.getElementById('modalLike');
const modalShare = document.getElementById('modalShare');
const modalClose = document.getElementById('modalClose');

let currentArticle = null;

async function openModal(article) {
    currentArticle = article;
    modalTitle.textContent = article.title;

    // 본문 텍스트 + 위/아래 풍경 이미지 (글 ID 시드로 결정적 — 같은 글 = 같은 이미지)
    document.getElementById('modalText').textContent = article.body;
    const [imgUrl1, imgUrl2] = pickImages(article.id);
    const imgTop = document.getElementById('modalImgTop');
    const imgBottom = document.getElementById('modalImgBottom');
    imgTop.classList.remove('error');
    imgBottom.classList.remove('error');
    imgTop.src = imgUrl1;
    imgBottom.src = imgUrl2;
    imgTop.onerror = () => imgTop.classList.add('error');
    imgBottom.onerror = () => imgBottom.classList.add('error');

    modalMeta.textContent = '';

    // URL 해시로 ID 반영 (공유·뒤로가기 지원)
    history.replaceState(null, '', '#' + article.id);

    // 좋아요 상태 초기화
    const slug = articleSlug(article.id);
    modalLike.classList.remove('liked', 'pulse');
    modalLike.disabled = false;
    modalLike.querySelector('.count').hidden = true;
    modalLike.querySelector('.label').hidden = false;

    if (localStorage.getItem('liked:' + slug)) {
        modalLike.classList.add('liked');
    }

    modal.classList.add('show');
    document.body.style.overflow = 'hidden';

    // 비동기로 카운트 가져오기
    const count = await fetchLikeCount(slug);
    updateLikeDisplay(modalLike, count);
}

function updateLikeDisplay(btn, count) {
    const countEl = btn.querySelector('.count');
    if (count >= 5) {
        countEl.textContent = '· ' + count;
        countEl.hidden = false;
    } else {
        countEl.hidden = true;
    }
}

modalLike.addEventListener('click', async () => {
    if (!currentArticle) return;
    if (modalLike.classList.contains('liked') || modalLike.disabled) return;
    const slug = articleSlug(currentArticle.id);
    modalLike.disabled = true;
    try {
        const newCount = await addLike(slug);
        updateLikeDisplay(modalLike, newCount);
        modalLike.classList.add('liked', 'pulse');
        localStorage.setItem('liked:' + slug, '1');
        setTimeout(() => modalLike.classList.remove('pulse'), 400);
    } catch (e) {
        console.error('좋아요 실패', e);
        alert('좋아요 처리 중 오류가 발생했어요.');
    } finally {
        modalLike.disabled = false;
    }
});

modalShare.addEventListener('click', async () => {
    if (!currentArticle) return;
    const url = location.origin + location.pathname + '#' + currentArticle.id;
    const text = `✨ ${currentArticle.title}\n\n${currentArticle.body.slice(0, 200)}${currentArticle.body.length > 200 ? '...' : ''}\n\n— 가좌버핏 뉴스 좋은글\n${url}`;
    const data = { title: currentArticle.title, text };
    if (navigator.share) {
        try { await navigator.share(data); } catch (e) {}
    } else {
        try {
            await navigator.clipboard.writeText(text);
            alert('아래 내용이 복사되었습니다:\n\n' + text);
        } catch (e) { prompt('복사해 주세요:', text); }
    }
});

function closeModal() {
    modal.classList.remove('show');
    document.body.style.overflow = '';
    currentArticle = null;
    history.replaceState(null, '', location.pathname);
}

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();
});

// ==== 초기화 ====
loadArticles().then(() => {
    // URL 해시에 ID가 있으면 해당 글 모달로 열기
    const hash = location.hash.slice(1);
    if (hash) {
        const found = ALL.find(a => a.id === hash);
        if (found) openModal(found);
    }
});
</script>
