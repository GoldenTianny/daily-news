name: ETF 데이터 자동 변환

# tools/etf/raw/ 폴더에 엑셀(.xlsx/.xlsm)이 업로드되면
# build_data.py로 JSON 변환 → dates.json 갱신 → 커밋 → 원본 엑셀 삭제
on:
  push:
    branches: [main]
    paths:
      - 'tools/etf/raw/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: openpyxl 설치
        run: pip install openpyxl

      - name: 엑셀 → JSON 변환
        id: convert
        run: |
          shopt -s nullglob
          files=(tools/etf/raw/*.xlsx tools/etf/raw/*.xlsm)
          if [ ${#files[@]} -eq 0 ]; then
            echo "변환할 엑셀 파일이 없습니다. 종료합니다."
            echo "converted=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          dates=""
          for f in "${files[@]}"; do
            name=$(basename "$f")
            # 파일명에서 YYYYMMDD 추출 (예: ETF_Raw_20260709.xlsx)
            if [[ $name =~ ([0-9]{8}) ]]; then
              d="${BASH_REMATCH[1]}"
              date_key="${d:0:4}-${d:4:2}-${d:6:2}"
            else
              # 날짜 없는 파일명이면 한국시간 오늘 날짜 사용
              date_key=$(TZ=Asia/Seoul date +%F)
            fi
            echo "== $name -> $date_key =="
            python3 tools/etf/build_data.py "$f" "$date_key" tools/etf/data
            git rm -q "$f"
            dates="$dates $date_key"
          done
          echo "converted=${dates# }" >> "$GITHUB_OUTPUT"

      - name: 커밋 & 푸시
        if: steps.convert.outputs.converted != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/etf/data
          if git diff --cached --quiet && git diff --quiet; then
            echo "변경 사항 없음"
            exit 0
          fi
          git commit -am "ETF 검색기 데이터 갱신: ${{ steps.convert.outputs.converted }} (자동 변환)"
          git push
